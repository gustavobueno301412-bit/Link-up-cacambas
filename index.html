<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM Link Up - Cruzeiro SP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        #mapa { height: 45%; width: 100%; border-bottom: 4px solid #ccc; z-index: 100; }
        #lista { height: 55%; overflow-y: auto; padding: 15px; }
        .card { background: white; padding: 15px; margin-bottom: 12px; border-radius: 12px; border-left: 12px solid #ccc; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; position: relative; }
        .btn-lixeira { position: absolute; top: 10px; right: 10px; border: none; background: none; font-size: 20px; cursor: pointer; color: #bbb; }
        .acoes { display: flex; gap: 8px; margin-top: 10px; }
        .btn { flex: 1; padding: 10px; border-radius: 6px; text-align: center; color: white; text-decoration: none; font-weight: bold; font-size: 13px; border: none; cursor: pointer; }
        .btn-whats { background: #25d366; }
        .btn-despacho { background: #3498db; }
        .badge-troco { background: #fff3cd; color: #856404; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-block; margin: 5px 0; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div id="mapa"></div>
<div id="lista"><div id="conteudo">Corrigindo datas...</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbyq4_LXcksXSjOSDwZKzhpO8FhqAr3LUbbrRSVXEnvH_NJDR3DG7PeSohS9rpYylybI/exec";
    const ID_EMPRESA = "1";
   
    var map = L.map('mapa').setView([-22.5744, -44.9622], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var camadaPinos = L.featureGroup().addTo(map);
    var dicionarioPinos = {};

    const icones = {
        verde: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
        amarelo: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-orange.png',
        vermelho: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        azul: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png'
    };

    function limparData(texto) {
        // Se a data vier estranha (formato ISO), a gente corta só o que interessa
        if (texto.toString().includes("T")) {
            let partesISO = texto.split("T")[0].split("-");
            return `${partesISO[2]}/${partesISO[1]}/${partesISO[0]}`;
        }
        return texto;
    }

    async function atualizar() {
        const resp = await fetch(`${URL_API}?funcao=buscarPedidos&id=${ID_EMPRESA}`);
        const pedidos = await resp.json();
        camadaPinos.clearLayers();
        let htmlCards = "";
        const hoje = new Date(); hoje.setHours(0,0,0,0);

        pedidos.forEach(p => {
            let dataFormatada = limparData(p.data);
            let partes = dataFormatada.split("/");
            let dt = new Date(partes[2], partes[1]-1, partes[0]);
           
            // Cálculo de dias com proteção contra erro NaN
            let diff = hoje.getTime() - dt.getTime();
            let diasRua = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (isNaN(diasRua)) diasRua = 0;

            let prazo = parseInt(p.prazo);

            let cor = "#28a745"; let iconeImg = icones.verde; let statusMsg = "DENTRO DO PRAZO";
            if(p.status === "Recolher") { cor = "#3498db"; iconeImg = icones.azul; statusMsg = "RETIRADA SOLICITADA"; }
            else if(diasRua >= prazo) { cor = "#dc3545"; iconeImg = icones.vermelho; statusMsg = "VENCIDO"; }
            else if(diasRua >= (prazo - 1)) { cor = "#ffc107"; iconeImg = icones.amarelo; statusMsg = "VENCE HOJE/AMANHÃ"; }

            let infoTempo = `📅 ${dataFormatada} às ${p.hora} | ⏱️ ${diasRua} dias na rua`;
           
            let conteudoPopup = `
                <div style="min-width:200px">
                    <b style="font-size:16px;">👤 ${p.nome}</b><br>
                    <span style="color:${cor}; font-weight:bold;">● ${statusMsg}</span><hr>
                    <b>Item:</b> ${p.equipamento}<br>
                    <b>Local:</b> ${p.endereco}<br>
                    <b>Finanças:</b> ${p.pagamento} ${p.troco > 0 ? '(Troco R$'+p.troco+')' : ''}<br>
                    <small>${infoTempo}</small>
                </div>`;

            let marcador = L.marker([p.lat, p.lng], {
                icon: L.icon({iconUrl: iconeImg, iconSize:[25,41], iconAnchor:[12,41]})
            }).addTo(camadaPinos).bindPopup(conteudoPopup);
            dicionarioPinos[p.idPedido] = marcador;

            let linkMaps = `http://google.com/maps?q=${p.lat},${p.lng}`;
            let textoZap = window.encodeURIComponent(`*PEDIDO LINK UP*\n*Cliente:* ${p.nome}\n*Item:* ${p.equipamento}\n*Endereço:* ${p.endereco}\n*ROTA GPS:* ${linkMaps}`);

            htmlCards += `
                <div class="card" style="border-left-color:${cor}" onclick="map.setView([${p.lat},${p.lng}], 18); dicionarioPinos['${p.idPedido}'].openPopup();">
                    <button class="btn-lixeira" onclick="event.stopPropagation(); excluir('${p.idPedido}')">🗑️</button>
                    <b>👤 ${p.nome}</b> <small>(${dataFormatada} às ${p.hora})</small><br>
                    <span>🛠️ ${p.equipamento}</span><br>
                    <small>📍 ${p.endereco}</small><br>
                    ${p.troco > 0 ? `<div class="badge-troco">💵 Troco p/ R$ ${p.troco}</div><br>` : `<span>💳 ${p.pagamento}</span><br>`}
                    <span style="color:${cor}; font-weight:bold;">${statusMsg} | ${diasRua} dias na rua</span>
                    <div class="acoes">
                        <a href="https://wa.me/${p.whatsapp}" target="_blank" class="btn btn-whats" onclick="event.stopPropagation();">WhatsApp</a>
                        <a href="https://wa.me/?text=${textoZap}" target="_blank" class="btn btn-despacho" onclick="event.stopPropagation();">🚛 Despachar</a>
                    </div>
                </div>`;
        });
        document.getElementById('conteudo').innerHTML = htmlCards || "Nenhum pedido.";
    }

    async function excluir(id) { if(confirm("Apagar?")) { await fetch(`${URL_API}?funcao=apagarPedido&idPedido=${id}`); atualizar(); } }
    atualizar();
    setInterval(atualizar, 60000);
</script>
</body>
</html>
