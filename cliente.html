<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Caçamba - LinkUP</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #f4f4f4; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .topo { text-align: center; margin-bottom: 20px; }
        #logoEmpresa { max-height: 80px; margin-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; }
        .status { text-align: center; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="topo">
        <img id="logoEmpresa" src="" alt="Carregando...">
        <h2 id="nomeEmpresa">Carregando...</h2>
    </div>

    <div id="formulario">
        <label>Seu Nome:</label>
        <input type="text" id="nomeCliente" placeholder="Digite seu nome completo">

        <label>WhatsApp:</label>
        <input type="tel" id="whatsappCliente" placeholder="Ex: 5512999999999">

        <label>Endereço de Entrega:</label>
        <input type="text" id="endereco" placeholder="Rua, número, bairro">

        <button id="btnEnviar" onclick="enviarPedido()">Solicitar Caçamba Agora</button>
        <p class="status" id="mensagemStatus">Buscando sua localização...</p>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbwYBuaZVn4osCbmOpYPTdItfn72T3uy4WNvsG025bBNPvu6NRL39_wmONE50Dp_txIQ/exec";
    const ID_EMPRESA = "1"; // Muda para 2 para outra empresa
    let lat = 0;
    let lng = 0;

    // 1. AO ABRIR: Busca Logo da Empresa e Pega Localização
    window.onload = async () => {
        try {
            const resp = await fetch(`${URL_API}?funcao=buscarConfig&id=${ID_EMPRESA}`);
            const config = await resp.json();
            document.getElementById('nomeEmpresa').innerText = config.nome;
            document.getElementById('logoEmpresa').src = config.logo;
        } catch (e) {
            console.error("Erro ao carregar empresa");
        }

        // Pega GPS do celular
        navigator.geolocation.getCurrentPosition(pos => {
            lat = pos.coords.latitude;
            lng = pos.coords.longitude;
            document.getElementById('mensagemStatus').innerText = "Localização obtida com sucesso!";
        }, err => {
            document.getElementById('mensagemStatus').innerText = "Por favor, ative o GPS.";
            document.getElementById('mensagemStatus').style.color = "red";
        });
    };

    // 2. FUNÇÃO PARA CALCULAR HORA (COM DESCONTO DE 3h06)
    function obterHoraAjustada() {
        let agora = new Date();
        // Subtrai 3 horas (3 * 60 min) e 6 minutos
        agora.setMinutes(agora.getMinutes() - (3 * 60 + 6));
       
        let h = String(agora.getHours()).padStart(2, '0');
        let m = String(agora.getMinutes()).padStart(2, '0');
        return `${h}:${m}`;
    }

    // 3. ENVIA OS DADOS PARA A PLANILHA
    async function enviarPedido() {
        const btn = document.getElementById('btnEnviar');
        const nome = document.getElementById('nomeCliente').value;
        const whats = document.getElementById('whatsappCliente').value;
        const end = document.getElementById('endereco').value;

        if (!nome || !end) {
            alert("Preencha o nome e o endereço!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Enviando...";

        const dadosPedido = {
            idEmpresa: ID_EMPRESA,
            nome: nome,
            whatsapp: whats,
            endereco: end,
            lat: lat,
            lng: lng,
            data: new Date().toLocaleDateString('pt-BR'),
            hora: obterHoraAjustada(), // Usa a hora com desconto aqui!
            prazo: "3" // Valor padrão que você definiu
        };

        try {
            await fetch(URL_API, {
                method: "POST",
                body: JSON.stringify(dadosPedido)
            });
            alert("Pedido enviado com sucesso! O dono da caçamba já recebeu.");
            location.reload();
        } catch (error) {
            alert("Erro ao enviar. Tente novamente.");
            btn.disabled = false;
            btn.innerText = "Solicitar Caçamba Agora";
        }
    }
</script>

</body>
</html>
